query checkSocialProviderStatus($input: CheckSocialStatusInput!) {
  checkSocialProviderStatus(input: $input) {
    data {
      actionRequired
      user {
        id
        code
        email
        phone
        token
        favLang
        arFullName
        enFullName
        profilePicture
        hasPassword
        arFirstName
        arLastName
        firstName
        lastName
        notificationsCount
        cartItemsCount
        country {
          isoCode
        }
      }
    }
    success
    message
    code
  }
}

