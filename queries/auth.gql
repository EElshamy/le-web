query me {
  me {
    data {
      id
      code
      email
      phone
      token
      favLang
      arFullName
      enFullName
      firstName
      lastName
      arFirstName
      arLastName
      profilePicture
      hasPassword
      notificationsCount
      cartItemsCount
      country {
        isoCode
      }
    }
    code
    message
    success
  }
}

mutation emailAndPasswordLogin($input: EmailAndPasswordLoginInput!) {
  emailAndPasswordLogin(input: $input) {
    data {
      id
      code
      email
      phone
      token
      favLang
      arFullName
      enFullName
      profilePicture
      hasPassword
      notificationsCount
      cartItemsCount
      country {
        isoCode
      }
    }
    code
    message
    success
  }
}

